services:
  - type: web
    name: genieacs-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    buildCommand: docker build -t genieacs-api .
    startCommand: /entrypoint.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: GENIEACS_MONGODB_CONNECTION_URL
        sync: false
    autoDeploy: true
    plan: free
